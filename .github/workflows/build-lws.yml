
name: Build et Deploiement pour LWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation des dependances (exemple pour Node/Vite)
        run: npm install

      - name: Execution du Build (generer le dossier dist)
        run: npm run build
        # Note : si votre projet n'utilise pas npm run build, 
        # remplacez cette ligne par la commande appropriée, 
        # ou une simple création de dossier de test comme : mkdir dist && echo "OK" > dist/index.html

      - name: Televerser l'artifact (le dossier dist)
        uses: actions/upload-artifact@v3
        with:
          name: mon-site-dist
          path: dist # C'est le dossier qui sera créé par le build
